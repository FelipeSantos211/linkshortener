version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: linkshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: maneger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/linkshortener
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: maneger
    depends_on:
      db:
        condition: service_healthy